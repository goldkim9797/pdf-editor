<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>할 일 목록</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 16px;
  }

  .app {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    width: 100%;
    max-width: 520px;
    height: fit-content;
    overflow: hidden;
  }

  .header {
    background: linear-gradient(135deg, #667eea, #764ba2);
    padding: 28px 28px 24px;
    color: #fff;
  }
  .header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.3px; }
  .header .summary { margin-top: 4px; font-size: 0.85rem; opacity: 0.8; }

  .input-area {
    display: flex;
    gap: 8px;
    padding: 20px 20px 0;
  }
  .input-area input {
    flex: 1;
    padding: 11px 14px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
    color: #2d3748;
  }
  .input-area input:focus { border-color: #667eea; }
  .input-area input::placeholder { color: #a0aec0; }

  .add-btn {
    padding: 11px 18px;
    background: #667eea;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  .add-btn:hover { background: #5a67d8; }
  .add-btn:active { transform: scale(0.95); }

  .filters {
    display: flex;
    gap: 6px;
    padding: 14px 20px 0;
  }
  .filter-btn {
    padding: 5px 13px;
    border: 2px solid #e2e8f0;
    border-radius: 20px;
    background: #fff;
    color: #718096;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: #667eea;
    border-color: #667eea;
    color: #fff;
  }

  .todo-list {
    padding: 12px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 80px;
  }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: #f7fafc;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    animation: slideIn 0.18s ease;
    transition: opacity 0.15s;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .todo-item.done { opacity: 0.55; }

  .check-btn {
    width: 22px; height: 22px;
    border: 2px solid #cbd5e0;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    color: #fff;
    transition: background 0.15s, border-color 0.15s;
  }
  .todo-item.done .check-btn {
    background: #667eea;
    border-color: #667eea;
  }

  .todo-text {
    flex: 1;
    font-size: 0.95rem;
    color: #2d3748;
    word-break: break-all;
    transition: text-decoration 0.15s;
  }
  .todo-item.done .todo-text {
    text-decoration: line-through;
    color: #a0aec0;
  }

  .del-btn {
    background: none;
    border: none;
    color: #cbd5e0;
    font-size: 1.1rem;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    flex-shrink: 0;
    transition: color 0.15s;
  }
  .del-btn:hover { color: #fc8181; }

  .empty {
    text-align: center;
    color: #a0aec0;
    font-size: 0.9rem;
    padding: 32px 0 24px;
  }
  .empty .icon { font-size: 2.5rem; display: block; margin-bottom: 8px; }

  .clear-btn {
    display: block;
    margin: 0 20px 18px;
    padding: 9px;
    background: none;
    border: 2px solid #fed7d7;
    border-radius: 10px;
    color: #e53e3e;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    width: calc(100% - 40px);
    transition: background 0.15s;
  }
  .clear-btn:hover { background: #fff5f5; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>할 일 목록</h1>
    <div class="summary" id="summary"></div>
  </div>

  <div class="input-area">
    <input id="input" type="text" placeholder="할 일을 입력하세요…" maxlength="200" autocomplete="off">
    <button class="add-btn" onclick="addTodo()">+</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">전체</button>
    <button class="filter-btn" data-filter="active" onclick="setFilter('active')">진행 중</button>
    <button class="filter-btn" data-filter="done" onclick="setFilter('done')">완료</button>
  </div>

  <div class="todo-list" id="list"></div>

  <button class="clear-btn" id="clear-btn" onclick="clearDone()" style="display:none">완료된 항목 모두 삭제</button>
</div>

<script>
let todos = JSON.parse(localStorage.getItem('todos') || '[]');
let filter = 'all';

function save() {
  localStorage.setItem('todos', JSON.stringify(todos));
}

function addTodo() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) { input.focus(); return; }
  todos.unshift({ id: Date.now(), text, done: false });
  save();
  render();
  input.value = '';
  input.focus();
}

function toggle(id) {
  const t = todos.find(t => t.id === id);
  if (t) t.done = !t.done;
  save();
  render();
}

function remove(id) {
  todos = todos.filter(t => t.id !== id);
  save();
  render();
}

function clearDone() {
  todos = todos.filter(t => !t.done);
  save();
  render();
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === f);
  });
  render();
}

function render() {
  const list = document.getElementById('list');
  const total = todos.length;
  const doneCount = todos.filter(t => t.done).length;
  const activeCount = total - doneCount;

  document.getElementById('summary').textContent =
    `전체 ${total}개 · 진행 중 ${activeCount}개 · 완료 ${doneCount}개`;
  document.getElementById('clear-btn').style.display = doneCount > 0 ? 'block' : 'none';

  const visible = todos.filter(t => {
    if (filter === 'active') return !t.done;
    if (filter === 'done') return t.done;
    return true;
  });

  if (visible.length === 0) {
    const msg = filter === 'done' ? '완료된 항목이 없어요.' :
                filter === 'active' ? '남은 할 일이 없어요! 🎉' : '할 일을 추가해 보세요.';
    list.innerHTML = `<div class="empty"><span class="icon">📋</span>${msg}</div>`;
    return;
  }

  list.innerHTML = visible.map(t => `
    <div class="todo-item${t.done ? ' done' : ''}">
      <button class="check-btn" onclick="toggle(${t.id})" title="${t.done ? '되돌리기' : '완료'}">
        ${t.done ? '✓' : ''}
      </button>
      <span class="todo-text">${escHtml(t.text)}</span>
      <button class="del-btn" onclick="remove(${t.id})" title="삭제">✕</button>
    </div>`).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTodo();
});

render();
</script>
</body>
</html>
