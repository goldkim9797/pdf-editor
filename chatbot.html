<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude AI 챗봇</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    max-width: 800px;
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #1a2540;
  }
  header a {
    color: #6a7f9e;
    text-decoration: none;
    font-size: 0.85rem;
  }
  header a:hover { color: #e94560; }
  header h1 { font-size: 1.1rem; font-weight: 700; color: #fff; flex: 1; }

  /* API key bar */
  #key-bar {
    width: 100%;
    max-width: 800px;
    padding: 10px 20px;
    background: #0d1a30;
    border-bottom: 1px solid #1a2540;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  #key-bar label { font-size: 0.78rem; color: #6a7f9e; white-space: nowrap; }
  #apikey {
    flex: 1;
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 6px;
    color: #e0e0e0;
    padding: 5px 10px;
    font-size: 0.82rem;
  }
  #apikey:focus { outline: none; border-color: #e94560; }
  #save-key {
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 5px 14px;
    font-size: 0.82rem;
    cursor: pointer;
    white-space: nowrap;
  }
  #save-key:hover { background: #c73652; }
  #model-select {
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 6px;
    color: #e0e0e0;
    padding: 5px 8px;
    font-size: 0.82rem;
  }
  #model-select:focus { outline: none; border-color: #e94560; }

  /* Chat area */
  #chat {
    flex: 1;
    width: 100%;
    max-width: 800px;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg {
    display: flex;
    gap: 10px;
    max-width: 100%;
  }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    flex-shrink: 0;
  }
  .msg.user .avatar { background: #e94560; color: #fff; }
  .msg.assistant .avatar { background: #0f3460; color: #4cc9f0; }

  .bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 0.9rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .bubble {
    background: #1a2e4a;
    border: 1px solid #0f3460;
    border-radius: 12px 4px 12px 12px;
  }
  .msg.assistant .bubble {
    background: #16213e;
    border: 1px solid #1a2540;
    border-radius: 4px 12px 12px 12px;
  }
  .msg.assistant .bubble.streaming { border-color: #4cc9f0; }

  .bubble code {
    background: #0a0f1e;
    padding: 2px 5px;
    border-radius: 4px;
    font-family: 'Consolas', monospace;
    font-size: 0.85em;
  }
  .bubble pre {
    background: #0a0f1e;
    padding: 10px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 8px 0;
  }
  .bubble pre code { background: none; padding: 0; }

  /* System message */
  .sys-msg {
    text-align: center;
    font-size: 0.78rem;
    color: #3a4a5e;
    padding: 4px 0;
  }
  .sys-msg.error { color: #e94560; }

  /* Input area */
  #input-area {
    width: 100%;
    max-width: 800px;
    padding: 14px 20px 20px;
    border-top: 1px solid #1a2540;
    display: flex;
    gap: 10px;
  }
  #msg-input {
    flex: 1;
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 10px;
    color: #e0e0e0;
    padding: 10px 14px;
    font-size: 0.9rem;
    resize: none;
    height: 46px;
    max-height: 140px;
    overflow-y: auto;
    line-height: 1.4;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  #msg-input:focus { outline: none; border-color: #e94560; }

  #send-btn {
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 10px;
    width: 46px;
    height: 46px;
    font-size: 1.1rem;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  #send-btn:hover:not(:disabled) { background: #c73652; }
  #send-btn:active:not(:disabled) { transform: scale(0.95); }
  #send-btn:disabled { background: #2a3a50; cursor: not-allowed; }

  #clear-btn {
    background: none;
    border: 1px solid #1a2540;
    border-radius: 10px;
    color: #6a7f9e;
    width: 46px;
    height: 46px;
    font-size: 1rem;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.15s, color 0.15s;
  }
  #clear-btn:hover { border-color: #e94560; color: #e94560; }

  /* Scrollbar */
  #chat::-webkit-scrollbar { width: 5px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: #1a2540; border-radius: 3px; }
</style>
</head>
<body>

<header>
  <a href="index.html">← 홈</a>
  <h1>🤖 Claude AI 챗봇</h1>
</header>

<div id="key-bar">
  <label for="apikey">API Key</label>
  <input id="apikey" type="password" placeholder="sk-ant-api03-..." autocomplete="off">
  <select id="model-select">
    <option value="claude-opus-4-8">Opus 4.8</option>
    <option value="claude-sonnet-4-6">Sonnet 4.6</option>
    <option value="claude-haiku-4-5">Haiku 4.5</option>
  </select>
  <button id="save-key">저장</button>
</div>

<div id="chat"></div>

<div id="input-area">
  <textarea id="msg-input" placeholder="메시지를 입력하세요… (Shift+Enter = 줄바꿈, Enter = 전송)"></textarea>
  <button id="clear-btn" title="대화 지우기">🗑</button>
  <button id="send-btn" title="전송">➤</button>
</div>

<script>
const API_URL = 'https://api.anthropic.com/v1/messages';
const LS_KEY = 'claude_api_key';
const LS_MODEL = 'claude_model';

const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const clearBtn = document.getElementById('clear-btn');
const apikeyEl = document.getElementById('apikey');
const saveKeyBtn = document.getElementById('save-key');
const modelSelect = document.getElementById('model-select');

let messages = [];
let isStreaming = false;

// Load saved key & model
apikeyEl.value = localStorage.getItem(LS_KEY) || '';
const savedModel = localStorage.getItem(LS_MODEL);
if (savedModel) modelSelect.value = savedModel;

saveKeyBtn.addEventListener('click', () => {
  const key = apikeyEl.value.trim();
  if (key) {
    localStorage.setItem(LS_KEY, key);
    addSysMsg('API Key가 저장되었습니다.');
  } else {
    localStorage.removeItem(LS_KEY);
    addSysMsg('API Key가 삭제되었습니다.');
  }
});

modelSelect.addEventListener('change', () => {
  localStorage.setItem(LS_MODEL, modelSelect.value);
});

clearBtn.addEventListener('click', () => {
  messages = [];
  chatEl.innerHTML = '';
  addSysMsg('대화가 초기화되었습니다.');
});

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = '46px';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

sendBtn.addEventListener('click', send);

function addSysMsg(text, isError = false) {
  const el = document.createElement('div');
  el.className = 'sys-msg' + (isError ? ' error' : '');
  el.textContent = text;
  chatEl.appendChild(el);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function addMessage(role, text, streaming = false) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? '나' : 'AI';

  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (streaming ? ' streaming' : '');
  bubble.textContent = text;

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;

  return bubble;
}

async function send() {
  if (isStreaming) return;

  const text = inputEl.value.trim();
  if (!text) return;

  const apiKey = apikeyEl.value.trim() || localStorage.getItem(LS_KEY) || '';
  if (!apiKey) {
    addSysMsg('API Key를 입력하고 저장해주세요.', true);
    return;
  }

  inputEl.value = '';
  inputEl.style.height = '46px';
  isStreaming = true;
  sendBtn.disabled = true;

  messages.push({ role: 'user', content: text });
  addMessage('user', text);

  const bubble = addMessage('assistant', '', true);

  let assistantText = '';

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: modelSelect.value,
        max_tokens: 4096,
        stream: true,
        messages: messages,
      }),
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;

        try {
          const parsed = JSON.parse(data);
          if (parsed.type === 'content_block_delta' && parsed.delta?.type === 'text_delta') {
            assistantText += parsed.delta.text;
            bubble.textContent = assistantText;
            chatEl.scrollTop = chatEl.scrollHeight;
          }
          if (parsed.type === 'message_stop') break;
        } catch (_) {}
      }
    }

    bubble.classList.remove('streaming');
    messages.push({ role: 'assistant', content: assistantText });

  } catch (err) {
    bubble.remove();
    messages.pop();
    addSysMsg('오류: ' + err.message, true);
  } finally {
    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

// Welcome
addSysMsg('Claude API Key를 입력하고 저장한 후 대화를 시작하세요.');
</script>
</body>
</html>
